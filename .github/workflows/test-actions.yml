name: Test Actions

on:
  push:
    branches: [master, main]
    paths:
      - 'actions/**'
      - '.github/workflows/test-actions.yml'
  pull_request:
    paths:
      - 'actions/**'
      - '.github/workflows/test-actions.yml'

jobs:
  # Test the export action (no DB, no service container — fastest possible)
  test-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build seedforge from source so we test current code, not the published package
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci && npm run build && npm link

      - name: Export SQL from Prisma schema
        id: export
        uses: ./actions/export
        with:
          prisma: ./actions/test-fixtures/schema.prisma
          output: test-seed.sql
          count: 20
          seed: 42

      - name: Verify outputs
        shell: bash
        run: |
          echo "Tables: ${{ steps.export.outputs.tables }}"
          echo "Rows:   ${{ steps.export.outputs.rows }}"
          echo "Duration: ${{ steps.export.outputs.duration }}ms"
          echo "Details: ${{ steps.export.outputs.details }}"

          # Assertions
          if [ "${{ steps.export.outputs.tables }}" -lt 1 ]; then
            echo "::error::Expected at least 1 table"
            exit 1
          fi
          if [ "${{ steps.export.outputs.rows }}" -lt 1 ]; then
            echo "::error::Expected at least 1 row"
            exit 1
          fi
          if [ ! -f test-seed.sql ]; then
            echo "::error::SQL file not generated"
            exit 1
          fi
          echo "Export action passed all checks"

      - name: Show generated SQL (first 30 lines)
        run: head -30 test-seed.sql

  # Test the seed action with SQLite (no service container needed)
  test-seed-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci && npm run build && npm link

      # Create a SQLite DB with tables, then seed it.
      # Step 1: export DDL from Prisma schema
      # Step 2: apply DDL to a SQLite file using sqlite3 CLI
      # Step 3: use the seed action to populate the tables
      - name: Create SQLite DB with schema
        run: |
          sqlite3 test-action.db <<'EOSQL'
          CREATE TABLE "User" (
            "id" INTEGER PRIMARY KEY AUTOINCREMENT,
            "email" TEXT NOT NULL UNIQUE,
            "name" TEXT NOT NULL,
            "createdAt" TEXT NOT NULL DEFAULT (datetime('now'))
          );
          CREATE TABLE "Post" (
            "id" INTEGER PRIMARY KEY AUTOINCREMENT,
            "title" TEXT NOT NULL,
            "body" TEXT NOT NULL,
            "published" INTEGER NOT NULL DEFAULT 0,
            "authorId" INTEGER NOT NULL REFERENCES "User"("id"),
            "createdAt" TEXT NOT NULL DEFAULT (datetime('now'))
          );
          CREATE TABLE "Comment" (
            "id" INTEGER PRIMARY KEY AUTOINCREMENT,
            "text" TEXT NOT NULL,
            "postId" INTEGER NOT NULL REFERENCES "Post"("id"),
            "createdAt" TEXT NOT NULL DEFAULT (datetime('now'))
          );
          EOSQL
          echo "SQLite DB created with $(sqlite3 test-action.db '.tables' | wc -w) tables"

      - name: Seed SQLite database
        id: seed
        uses: ./actions/seed
        with:
          db: sqlite:./test-action.db
          count: 10
          seed: 42

      - name: Verify seed outputs
        shell: bash
        run: |
          echo "Tables: ${{ steps.seed.outputs.tables }}"
          echo "Rows:   ${{ steps.seed.outputs.rows }}"
          echo "Duration: ${{ steps.seed.outputs.duration }}ms"

          if [ "${{ steps.seed.outputs.tables }}" -lt 1 ]; then
            echo "::error::Expected at least 1 table"
            exit 1
          fi
          if [ "${{ steps.seed.outputs.rows }}" -lt 1 ]; then
            echo "::error::Expected at least 1 row"
            exit 1
          fi
          echo "Seed action passed all checks"
